server {
    listen 8443 ssl;
    server_name macosx.kooldns.cn;

    ssl_certificate     /opt/homebrew/etc/nginx/certs/webdav-selfsigned.crt;
    ssl_certificate_key /opt/homebrew/etc/nginx/certs/webdav-selfsigned.key;
    add_header X-Content-Type-Options nosniff always;

    location = / { return 302 https://$host/support/obsidian-media-claim/; }
    location / { proxy_pass http://127.0.0.1:18081; }
}
